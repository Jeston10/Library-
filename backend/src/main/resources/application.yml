spring:
  application:
    name: community-library-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/library_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: true
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

library:
  security:
    jwt-secret: ${JWT_SECRET:9a4f2c8d3e1b7f6a5c4d3e2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a21}
    jwt-expiration-ms: 86400000 # 24 hours
  rules:
    fine-per-day-cents: 50 # $0.50
    reservation-expiry-days: 3
